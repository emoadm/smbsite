name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-eu-dsn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Verify EU Sentry DSN (Pitfall G)
        run: pnpm verify:eu-dsn
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  migrate:
    needs: verify-eu-dsn
    environment:
      name: production    # GitHub Actions environment with required reviewers (destructive gate per D-23)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Drizzle migrate (DIRECT_URL — Pitfall C)
        run: pnpm drizzle-kit migrate
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
      # TEMPORARILY DISABLED — see .planning/todos/payload-tsx-esm-incompat.md
      # `pnpm exec payload migrate` fails on Node 22 + tsx@4.21 because tsx
      # removed the .js→.ts auto-rewrite. The only Payload migration
      # (20260501_160443_init.ts) is already applied to prod, so skipping
      # is safe for now. Re-enable after the tsx incompat is fixed and
      # before merging any new Payload schema changes.
      # - name: Payload migrate
      #   run: CI=true PAYLOAD_MIGRATING=true pnpm exec payload migrate
      #   env:
      #     PAYLOAD_DATABASE_URL: ${{ secrets.DIRECT_URL }}
      #     PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io (rolling)
        # NEXT_PUBLIC_* must be passed as Docker build args so `next build` inlines
        # them into the client bundle. Set these in GitHub repo secrets.
        # Phase 2.1 (D-02): MAXMIND_LICENSE_KEY passed as a build-secret so the
        # Dockerfile builder stage can download GeoLite2-City.mmdb without ever
        # baking the key into an image layer.
        run: |
          flyctl deploy --strategy rolling --remote-only \
            --build-secret "MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }}" \
            --build-arg "NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
            --build-arg "NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}" \
            --build-arg "NEXT_PUBLIC_COOKIEYES_SITE_KEY=${{ secrets.NEXT_PUBLIC_COOKIEYES_SITE_KEY }}" \
            --build-arg "EMAIL_FROM_TRANSACTIONAL=${{ secrets.EMAIL_FROM_TRANSACTIONAL }}" \
            --build-arg "DATABASE_URL=${{ secrets.DATABASE_URL }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Why GET (not HEAD) and why a 100-byte body floor:
      #   The chastnik-eu-empty-page bug shipped a Next.js app that returned
      #   200 + Content-Length: 0 — a HEAD probe would have green-lit it.
      #   Working pages return 27k-58k bytes; a 100-byte floor cleanly
      #   distinguishes "real HTML" from "empty Response", with no risk of
      #   false negatives. Three retries × 10s sleep absorb rolling-deploy
      #   readiness lag without masking a genuinely broken deploy.
      #   See: .planning/debug/resolved/chastnik-eu-empty-page.md
      #
      # Why this step lives INSIDE the deploy job (not a separate `needs: deploy`
      # job): there is no circular dependency on its own success — the step
      # only runs because flyctl deploy returned exit 0, and a failure here
      # fails the deploy job (and the workflow) loudly without needing an
      # extra job-level gate.
      - name: Post-deploy smoke (GET / /register /login, body > 100 bytes)
        run: |
          set -uo pipefail
          BASE="https://chastnik.eu"
          fail=0
          for path in "/" "/register" "/login"; do
            ok=0
            for attempt in 1 2 3; do
              out=$(curl -sS -o /tmp/body -w "%{http_code} %{size_download}" -L "${BASE}${path}" || echo "000 0")
              code=${out%% *}
              size=${out##* }
              if [[ "$code" =~ ^(2|3)[0-9][0-9]$ ]] && [ "$size" -gt 100 ]; then
                echo "OK ${path} (attempt ${attempt}): ${code} ${size}B"
                ok=1
                break
              fi
              echo "FAIL ${path} (attempt ${attempt}/3): code=${code} size=${size}B"
              [ "$attempt" -lt 3 ] && sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::Smoke failed for ${path} after 3 attempts. Last body (first 500B):"
              head -c 500 /tmp/body || true
              echo
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "OK: post-deploy smoke gate passed (3 paths × ≤3 attempts)."
