app = "smbsite-prod"
primary_region = "fra"
# Cold-start prevention — Pitfall H
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[processes]
  web    = "node server.js"
  # Plan 1.10 worker; consumes the BullMQ queue from the same Upstash Redis
  worker = "node --import tsx scripts/start-worker.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines  = false   # Pitfall H — never auto-stop web
  auto_start_machines = true
  min_machines_running = 1      # Pitfall H — keep one warm
  processes = ["web"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["web"]

[[vm]]
  # Phase 02.1 D-WorkerOOM: bumped 256mb → 1024mb. tsx + MaxMind reader (65MB)
  # + BullMQ + IORedis + Drizzle + Pino combined OOM the worker on 256mb.
  # Same fix Plan 08 applied to staging on 2026-05-03 after run #3.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  AUTH_URL = "https://chastnik.eu"
