app = "smbsite-staging"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[processes]
  web    = "node server.js"
  worker = "node --import tsx scripts/start-worker.ts"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["web"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  AUTH_URL = "https://staging.chastnik.eu"
